###############################################################################
#  THISAI — Scaled Load-Test Docker Compose (Multi-Node)
#
#  Usage:
#    docker compose -f docker-compose.loadtest.yml up -d --build
#    docker compose -f docker-compose.loadtest.yml exec app-1 php artisan db:seed --class=LoadTestSeeder
#    k6 run --vus 500 --env TOTAL_VUS=500 tests/Load/exam_load_test.js
#
#  Architecture:
#    Client → Nginx (load balancer) → [app-1, app-2, app-3] → PgBouncer → PostgreSQL
#                                                            → Redis
###############################################################################

services:

  # ─── Application Node 1 ──────────────────────────────────────────────────
  app-1:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-app-1
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php-loadtest.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/www-loadtest.conf:/usr/local/etc/php-fpm.d/zz-loadtest.conf
    networks:
      - thisai-network
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_READ_HOST: pgbouncer
      REDIS_HOST: redis

  # ─── Application Node 2 ──────────────────────────────────────────────────
  app-2:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-app-2
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php-loadtest.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/www-loadtest.conf:/usr/local/etc/php-fpm.d/zz-loadtest.conf
    networks:
      - thisai-network
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_READ_HOST: pgbouncer
      REDIS_HOST: redis

  # ─── Application Node 3 ──────────────────────────────────────────────────
  app-3:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-app-3
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php-loadtest.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/www-loadtest.conf:/usr/local/etc/php-fpm.d/zz-loadtest.conf
    networks:
      - thisai-network
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_READ_HOST: pgbouncer
      REDIS_HOST: redis

  # ─── Nginx Load Balancer (Round-Robin across 3 app nodes) ────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: thisai-nginx-lb
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/loadtest.conf:/etc/nginx/conf.d/default.conf
    networks:
      - thisai-network
    depends_on:
      - app-1
      - app-2
      - app-3

  # ─── PgBouncer Connection Pooler ─────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: thisai-pgbouncer
    restart: unless-stopped
    environment:
      - DB_NAME=thisai
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_USER=thisai
      - DB_PASSWORD=thisai_secret_2024
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=5000
      - DEFAULT_POOL_SIZE=100
      - MIN_POOL_SIZE=20
      - RESERVE_POOL_SIZE=25
      - RESERVE_POOL_TIMEOUT=3
    ports:
      - "6432:5432"
    networks:
      - thisai-network
    depends_on:
      pgsql:
        condition: service_healthy

  # ─── PostgreSQL (Tuned for Load Testing) ─────────────────────────────────
  pgsql:
    image: postgres:16-alpine
    container_name: thisai-pgsql-lt
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: thisai
      POSTGRES_USER: thisai
      POSTGRES_PASSWORD: thisai_secret_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgsql-lt-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c" 
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=500"
    networks:
      - thisai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thisai"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis (Higher memory for sessions + cache + queues) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: thisai-redis-lt
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --tcp-backlog 511 --timeout 0 --tcp-keepalive 300
    volumes:
      - redis-lt-data:/data
    networks:
      - thisai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Queue Workers (3 parallel workers) ──────────────────────────────────
  queue-1:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-queue-1
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600 --max-jobs=1000
    volumes:
      - .:/var/www/html
      - ./docker/php/php-loadtest.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - thisai-network
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      - app-1
      - redis
      - pgbouncer

  queue-2:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-queue-2
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600 --max-jobs=1000
    volumes:
      - .:/var/www/html
      - ./docker/php/php-loadtest.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - thisai-network
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      - app-1
      - redis
      - pgbouncer

  queue-3:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-queue-3
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600 --max-jobs=1000
    volumes:
      - .:/var/www/html
      - ./docker/php/php-loadtest.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - thisai-network
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      REDIS_HOST: redis
    depends_on:
      - app-1
      - redis
      - pgbouncer

volumes:
  pgsql-lt-data:
    driver: local
  redis-lt-data:
    driver: local

networks:
  thisai-network:
    driver: bridge
