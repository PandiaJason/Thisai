services:
  # PHP Application
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - thisai-network
    depends_on:
      - pgsql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:1.27-alpine
    container_name: thisai-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - thisai-network
    depends_on:
      - app

  # PostgreSQL Database
  pgsql:
    image: postgres:16-alpine
    container_name: thisai-pgsql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: thisai
      POSTGRES_USER: thisai
      POSTGRES_PASSWORD: thisai_secret_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - thisai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thisai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: thisai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - thisai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Queue Worker
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    networks:
      - thisai-network
    depends_on:
      - app
      - redis
      - pgsql

  # Task Scheduler
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: thisai-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    networks:
      - thisai-network
    depends_on:
      - app
      - redis
      - pgsql

  # Node.js for asset compilation
  node:
    image: node:22-alpine
    container_name: thisai-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - thisai-network
    profiles:
      - build

volumes:
  pgsql-data:
    driver: local
  redis-data:
    driver: local

networks:
  thisai-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1200"
