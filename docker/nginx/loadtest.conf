# ─── Nginx Load Balancer Config for Load Testing ───────────────────────────
# Routes traffic round-robin across 3 PHP-FPM app nodes

upstream thisai_backend {
    least_conn;  # Route to the node with fewest active connections
    server app-1:9000;
    server app-2:9000;
    server app-3:9000;

    keepalive 64;  # Persistent connections to backends
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Increase worker connections for load testing
    # (set in main nginx.conf, not server block — these are request-level settings)

    # Disable access logging during load tests for performance
    access_log off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    client_max_body_size 260M;

    # Increase buffers for high concurrency
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass thisai_backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Increased timeouts for load testing
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout 60;

        # Larger buffers for concurrent responses
        fastcgi_buffers 32 16k;
        fastcgi_buffer_size 32k;

        # Keep connections alive to backends
        fastcgi_keep_conn on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
