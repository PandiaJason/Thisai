; ─── PHP-FPM Pool Tuning for Load Testing ──────────────────────────────────
; Each app node runs a static pool of 50 workers (3 nodes = 150 total workers)

[www]
pm = static
pm.max_children = 50
pm.max_requests = 1000

; Slow-log for identifying bottleneck endpoints
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2
