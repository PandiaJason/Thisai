[PHP]
; ─── Tuned for Load Testing (10,000+ concurrent users) ─────────────────────

; Memory — lower per-request since exam endpoints are lightweight
memory_limit = 256M
max_execution_time = 120
max_input_time = 60

; Upload — not needed during load tests, keep low
upload_max_filesize = 10M
post_max_size = 12M

; OPcache — aggressive caching, no file revalidation
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.enable_file_override = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; Session — Redis-backed
session.save_handler = redis
session.save_path = "tcp://redis:6379"

; Error handling — suppress for performance
display_errors = Off
log_errors = On
error_reporting = E_ERROR | E_WARNING

; Realpath cache — reduce filesystem stat() calls
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; Date
date.timezone = Asia/Kolkata
